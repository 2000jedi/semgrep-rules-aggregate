    - http://phrack.org/issues/70/13.html#article
    - https://g.co/kgs/PCHQjJ
    - https://www.sei.cmu.edu/downloads/sei-cert-c-coding-standard-2016-v01.pdf
  message: The software uses a function that accepts a format string as an argument,
    but the format string originates from an external source. This can lead  to buffer
    overflows, denial of service, or data representation problems.
  severity: ERROR
  languages:
  - c
  - cpp
  pattern-either:
  - patterns:
    - pattern-either:
      - pattern: printf(...)
      - pattern: vprintf(...)
      - pattern: wprintf(...)
      - pattern: vwprintf(...)
      - pattern: vcprintf(...)
      - pattern: vcwprintf(...)
      - pattern: vscprintf(...)
      - pattern: vscwprintf(...)
      - pattern: printk(...)
      - pattern: scanf(...)
      - pattern: __isoc99_scanf(...)
      - pattern: vscanf(...)
      - pattern: __isoc99_vscanf(...)
      - pattern: wscanf(...)
      - pattern: vwscanf(...)
      - pattern: warn(...)
      - pattern: vwarn(...)
      - pattern: warnx(...)
      - pattern: vwarnx(...)
    - pattern-not: $_("...", ...)
    - pattern-not: $_(gettext(...), ...)
    - pattern-not: $_(dgettext(...), ...)
    - pattern-not: $_(dcgettext(...), ...)
  - patterns:
    - pattern-either:
      - pattern: fprintf(...)
      - pattern: vfprintf(...)
      - pattern: fwprintf(...)
      - pattern: vfwprintf(...)
      - pattern: sprintf(...)
      - pattern: vsprintf(...)
      - pattern: asprintf(...)
      - pattern: vasprintf(...)
      - pattern: dprintf(...)
      - pattern: vdprintf(...)
      - pattern: wsprintf(...)
      - pattern: fscanf(...)
      - pattern: __isoc99_fscanf(...)
      - pattern: vfscanf(...)
      - pattern: __isoc99_vfscanf(...)
      - pattern: fwscanf(...)
      - pattern: vfwscanf(...)
      - pattern: sscanf(...)
      - pattern: __isoc99_sscanf(...)
      - pattern: vsscanf(...)
      - pattern: __isoc99_vsscanf(...)
      - pattern: swscanf(...)
      - pattern: vswscanf(...)
      - pattern: syslog(...)
      - pattern: vsyslog(...)
      - pattern: err(...)
