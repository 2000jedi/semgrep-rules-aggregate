rules:
- id: c.lang.security.insecure-use-scanf-fn.insecure-use-scanf-fn
  pattern: scanf(...)
  message: Avoid using 'scanf()'. This function, when used improperly, does not consider
    buffer boundaries and can lead to buffer overflows. Use 'fgets()' instead for
    reading input.
  metadata:
    references:
    - http://sekrit.de/webdocs/c/beginners-guide-away-from-scanf.html
    category: security
    technology:
    - c
    license: Commons Clause License Condition v1.0[LGPL-2.1-only]
    source: https://semgrep.dev/r/c.lang.security.insecure-use-scanf-fn.insecure-use-scanf-fn
  languages:
  - c
  severity: ERROR
- id: c.lang.security.insecure-use-strtok-fn.insecure-use-strtok-fn
  pattern: strtok(...)
  message: Avoid using 'strtok()'. This function directly modifies the first argument
    buffer, permanently erasing the delimiter character. Use 'strtok_r()' instead.
  metadata:
    references:
    - https://wiki.sei.cmu.edu/confluence/display/c/STR06-C.+Do+not+assume+that+strtok%28%29+leaves+the+parse+string+unchanged
    - https://man7.org/linux/man-pages/man3/strtok.3.html#BUGS
    - https://stackoverflow.com/a/40335556
    category: security
    technology:
    - c
    license: Commons Clause License Condition v1.0[LGPL-2.1-only]
    source: https://semgrep.dev/r/c.lang.security.insecure-use-strtok-fn.insecure-use-strtok-fn
  languages:
  - c
  severity: ERROR
- id: raptor-insecure-api-alloca
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    category: security
    subcategory:
    - vuln
    vulnerability_class: Dangerous Method or Function
    likelihood: MEDIUM
    impact: HIGH
    confidence: HIGH
    technology:
    - c
    - cpp
    cwe:
    - 'CWE-676: Use of Potentially Dangerous Function'
    - 'CWE-1325: Improperly Controlled Sequential Memory Allocation'
    owasp:
    - A06:2025 - Insecure Design
    references:
    - https://nullprogram.com/blog/2019/10/28/
    - https://docs.microsoft.com/en-us/cpp/sanitizers/asan-error-examples
  message: Use of alloca() is unsafe because it cannot ensure that the pointer  returned
    points to a valid and usable block of memory. The allocation  made may exceed
    the bounds of the stack, or even go further into other  objects in memory, and
    alloca() cannot determine such an error.
  severity: ERROR
  languages:
  - c
  - cpp
  pattern: alloca(...)
- id: raptor-unchecked-ret-scanf
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    category: security
    subcategory:
    - audit
    vulnerability_class: Other Security
    likelihood: MEDIUM
    impact: LOW
    confidence: MEDIUM
    technology:
    - c
    - cpp
    cwe:
    - 'CWE-252: Unchecked Return Value'
    owasp:
    - A10:2025 - Mishandling of Exceptional Conditions
    references:
    - https://codeql.github.com/codeql-query-help/cpp/cpp-missing-check-scanf/
  message: The software does not check the return value from a method or function,
    which can prevent it from detecting unexpected states and conditions.
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: $FUN(...)
  - metavariable-pattern:
      metavariable: $FUN
      pattern-either:
      - pattern: scanf
      - pattern: __isoc99_scanf
      - pattern: vscanf
      - pattern: __isoc99_vscanf
      - pattern: fscanf
      - pattern: __isoc99_fscanf
      - pattern: vfscanf
      - pattern: __isoc99_vfscanf
      - pattern: sscanf
      - pattern: __isoc99_sscanf
      - pattern: vsscanf
      - pattern: __isoc99_vsscanf
      - pattern: wscanf
      - pattern: vwscanf
      - pattern: fwscanf
      - pattern: vfwscanf
      - pattern: swscanf
      - pattern: vswscanf
  - pattern-not-inside: $_ = $FUN(...)
  - pattern-not-inside: <... $FUN(...) == $_ ...>
  - pattern-not-inside: <... $_ == $FUN(...) ...>
  - pattern-not-inside: <... $FUN(...) != $_ ...>
  - pattern-not-inside: <... $_ != $FUN(...) ...>
  - pattern-not-inside: <... $FUN(...) < $_ ...>
  - pattern-not-inside: <... $_ > $FUN(...) ...>
  - pattern-not-inside: <... $FUN(...) <= $_ ...>
  - pattern-not-inside: <... $_ >= $FUN(...) ...>
  - pattern-not-inside: <... $FUN(...) > $_ ...>
  - pattern-not-inside: <... $_ < $FUN(...) ...>
  - pattern-not-inside: <... $FUN(...) >= $_ ...>
  - pattern-not-inside: <... $_ <= $FUN(...) ...>
  - pattern-not-inside: return $FUN(...);
