rules:
- id: raptor-insecure-api-access-stat-lstat
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/367
    - https://g.co/kgs/PCHQjJ
    confidence: HIGH
  message: The software checks the state of a resource before using that resource,
    but the resource's state can change between the check and the use in a way that
    invalidates the results of the check. This can cause the software to perform invalid
    actions when the resource is in an unexpected state. This weakness can be security-relevant
    when an attacker can influence the state of the resource between check and use.
    This can happen with shared resources such as files, memory, or even variables
    in multithreaded programs.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: access(...)
  - pattern: stat(...)
  - pattern: lstat(...)
- id: variable-printf-fmt
  message: Avoid using non-literal format strings passed into the 'printf' family
    of functions. If the format string is user-controllable, the application is vulnerable
    to attack.
  metadata:
    references:
    - https://www.cvedetails.com/cwe-details/134/Uncontrolled-Format-String.html
    category: security
    technology:
    - c
  languages:
  - c
  - c++
  severity: INFO
  pattern-either:
  - patterns:
    - pattern: printf(...)
    - pattern-not: printf("...",...)
  - patterns:
    - pattern: fprintf(...)
    - pattern-not: fprintf($DEST, "...", ...)
  - patterns:
    - pattern: dprintf(...)
    - pattern-not: dprintf($DEST, "...", ...)
  - patterns:
    - pattern: sprintf(...)
    - pattern-not: sprintf($DEST, "...", ...)
  - patterns:
    - pattern: snprintf(...)
    - pattern-not: snprintf($DEST, $SZ, "...", ...)
  - patterns:
    - pattern: vprintf(...)
    - pattern-not: vprintf("...",...)
  - patterns:
    - pattern: vfprintf(...)
    - pattern-not: vfprintf($DEST, "...", ...)
  - patterns:
    - pattern: vdprintf(...)
    - pattern-not: vdprintf($DEST, "...", ...)
  - patterns:
    - pattern: vsprintf(...)
    - pattern-not: vsprintf($DEST, "...", ...)
  - patterns:
    - pattern: vsnprintf(...)
    - pattern-not: vsnprintf($DEST, $SZ, "...", ...)
  - patterns:
    - pattern: gzprintf(...)
    - pattern-not: gzprintf($DEST, "...", ...)
- id: variable-scanf-fmt
  message: Avoid using non-literal format strings passed into the 'scanf' family of
    functions. If the format string is user-controllable, the application is vulnerable
    to attack.
  metadata:
    references:
    - https://www.cvedetails.com/cwe-details/134/Uncontrolled-Format-String.html
    category: security
    technology:
    - c
  languages:
  - c
  - c++
  severity: INFO
  pattern-either:
  - patterns:
    - pattern: scanf(...)
    - pattern-not: scanf("...",...)
  - patterns:
    - pattern: fscanf(...)
    - pattern-not: fscanf($DEST, "...", ...)
  - patterns:
    - pattern: sscanf(...)
    - pattern-not: sscanf($DEST, "...", ...)
  - patterns:
    - pattern: vscanf(...)
    - pattern-not: vscanf("...",...)
  - patterns:
    - pattern: vfscanf(...)
    - pattern-not: vfscanf($DEST, "...", ...)
  - patterns:
    - pattern: vsscanf(...)
    - pattern-not: vsscanf($DEST, "...", ...)
- id: raptor-ret-stack-address
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/562
    - https://github.com/struct/mms
    - https://www.sei.cmu.edu/downloads/sei-cert-c-coding-standard-2016-v01.pdf
    - https://docs.microsoft.com/en-us/cpp/sanitizers/asan-error-examples
    - https://rules.sonarsource.com/c/type/Bug/RSPEC-946
    confidence: MEDIUM
  message: A function returns the address of a stack variable, which will cause unintended
    program behavior, typically in the form of a crash. Because local variables are
    allocated on the stack, when a program returns a pointer to a local variable,
    it is returning a stack address. A subsequent function call is likely to re-use
    this same stack address, thereby overwriting the value of the pointer, which no
    longer corresponds to the same variable since a function's stack frame is invalidated
    when it returns. At best this will cause the value of the pointer to change unexpectedly.
    In many cases it causes the program to crash the next time the pointer is dereferenced.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - patterns:
    - pattern: return $PTR;
    - pattern-either:
      - pattern-inside: '$TYPE $PTR[$SIZE];

          ...

          '
      - pattern-inside: '$TYPE $PTR[$SIZE] = $EXPR;

          ...

          '
      - pattern-inside: '$TYPE $ARR[$SIZE];

          ...

          $PTR = $ARR;

          ...

          '
      - pattern-inside: '$TYPE $ARR[$SIZE] = $EXPR;

          ...

          $PTR = $ARR;

          ...

          '
  - patterns:
    - pattern: return &$VAR;
    - pattern-either:
      - pattern-inside: '$TYPE $VAR;

          ...

          '
      - pattern-inside: '$TYPE $VAR = $EXPR;

          ...

          '
- id: Unsafe-return-value INFO check 1
  metadata:
    author: FXC
  severity: INFO
  languages:
  - c
  - cpp
  message: 'INFO: The value of snprintf(vnsprintf) is dangerous, which may lead to
    malicious exploitation, such as information leakage.'
  pattern-either:
  - patterns:
    - pattern: '$LENGTH = $FUN($BUF, $SIZE, $FMT, ...);

        '
    - metavariable-pattern:
        metavariable: $FUN
        pattern-either:
        - pattern: snprintf
        - pattern: vsnprintf
    - pattern-regex: '%s'
- id: Unsafe-return-value INFO check 2
  metadata:
    author: FXC
  severity: INFO
  languages:
  - c
  - cpp
  message: 'INFO: The value of strlcpy(strlcat) is dangerous, which may lead to malicious
    exploitation, such as information leakage.'
  pattern-either:
  - patterns:
    - pattern: '$LENGTH = $FUN($BUF, $BUF1, $SIZE);

        '
    - metavariable-pattern:
        metavariable: $FUN
        pattern-either:
        - pattern: strlcpy
        - pattern: strlcat
