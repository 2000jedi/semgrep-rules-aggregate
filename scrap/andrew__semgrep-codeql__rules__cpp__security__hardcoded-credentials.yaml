rules:
  - id: codeql-cpp-hardcoded-password
    message: >-
      Hardcoded password detected. Passwords should be stored securely in
      environment variables or a secrets manager.
    severity: ERROR
    languages:
      - cpp
      - c
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      technology:
        - cpp
      confidence: MEDIUM
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - vuln
      references:
        - https://cwe.mitre.org/data/definitions/798.html
    pattern-either:
      - pattern: const char *password = "...";
      - pattern: char *password = "...";
      - pattern: char password[] = "...";
      - pattern: std::string password = "...";
      - pattern: const char *secret = "...";
      - pattern: const char *api_key = "...";

  - id: codeql-cpp-hardcoded-private-key
    message: >-
      Hardcoded private key detected. Private keys should be loaded from
      secure storage.
    severity: ERROR
    languages:
      - cpp
      - c
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      technology:
        - cpp
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - vuln
      references:
        - https://cwe.mitre.org/data/definitions/798.html
    pattern-regex: '-----BEGIN\s+(RSA\s+)?PRIVATE\s+KEY-----'
