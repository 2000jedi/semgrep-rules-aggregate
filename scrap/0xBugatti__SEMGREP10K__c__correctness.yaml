- id: raptor-signed-unsigned-conversion
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/195
    - https://cwe.mitre.org/data/definitions/196
    - https://cwe.mitre.org/data/definitions/194
