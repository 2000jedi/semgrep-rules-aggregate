        '
    - pattern-not-inside: 'malloc(...);

        ...

        if (<... $RET != NULL ...>) ...

        '
    - pattern-not-inside: 'malloc(...);

        ...

        if (<... !$RET ...>) ...

        '
    - pattern-not-inside: 'malloc(...);

        ...

        if (<... $RET ...>) ...

