rules:
- id: c-outbound-socket
  pattern: socket(...)
  message: 'socket() - creating network socket.

    '
  severity: WARNING
  languages:
  - c
  - cpp
  metadata:
    category: network-inventory
- id: c-outbound-connect
  pattern: connect(...)
  message: 'connect() - outbound network connection.

    '
  severity: WARNING
  languages:
  - c
  - cpp
  metadata:
    category: network-inventory
- id: c-outbound-send
  pattern: send(...)
