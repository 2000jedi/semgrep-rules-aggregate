rules:
  - id: codeql-cpp-world-writable
    message: >-
      File created with world-writable permissions. This may allow unauthorized
      modification of the file.
    severity: WARNING
    languages:
      - cpp
      - c
    metadata:
      category: security
      cwe: "CWE-732: Incorrect Permission Assignment for Critical Resource"
      technology:
        - cpp
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
      subcategory:
        - vuln
      references:
        - https://cwe.mitre.org/data/definitions/732.html
        - https://github.com/github/codeql/blob/main/cpp/ql/src/Security/CWE/CWE-732/DoNotCreateWorldWritable.ql
      source-rule-url: https://github.com/github/codeql/blob/main/cpp/ql/src/Security/CWE/CWE-732/DoNotCreateWorldWritable.ql
    pattern-either:
      - pattern: open($PATH, ..., 0777)
      - pattern: open($PATH, ..., 0666)
      - pattern: chmod($PATH, 0777)
      - pattern: chmod($PATH, 0666)
      - pattern: fchmod($FD, 0777)
      - pattern: fchmod($FD, 0666)

  - id: codeql-cpp-open-missing-mode
    message: >-
      Call to open() with O_CREAT but no mode argument. File permissions will
      be undefined.
    severity: WARNING
    languages:
      - cpp
      - c
    metadata:
      category: security
      cwe: "CWE-732: Incorrect Permission Assignment for Critical Resource"
      technology:
        - cpp
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
      subcategory:
        - vuln
      references:
        - https://cwe.mitre.org/data/definitions/732.html
        - https://github.com/github/codeql/blob/main/cpp/ql/src/Security/CWE/CWE-732/OpenCallMissingModeArgument.ql
      source-rule-url: https://github.com/github/codeql/blob/main/cpp/ql/src/Security/CWE/CWE-732/OpenCallMissingModeArgument.ql
    patterns:
      - pattern: open($PATH, $FLAGS)
      - metavariable-regex:
          metavariable: $FLAGS
          regex: '.*O_CREAT.*'
