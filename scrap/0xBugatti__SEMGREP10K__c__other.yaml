- id: raptor-off-by-one
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/193
    - https://cwe.mitre.org/data/definitions/787
    - https://g.co/kgs/PCHQjJ
    - https://github.com/struct/mms
    confidence: MEDIUM
  message: The software calculates or uses an incorrect maximum or minimum value that
    is 1 more, or 1 less, than the correct value.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: $BUF[sizeof($BUF)] = $EXPR
  - patterns:
    - pattern: $BUF[$SIZE] = $EXPR
    - pattern-inside: '$TYPE $BUF[$SIZE];

        ...

        $BUF[$SIZE] = $EXPR;

        '
  - pattern: for (<... $I = 0 ...>; <... $I <= $SIZE ...>; <... $I++ ...>) ...
  - pattern: for ($TYPE $I = 0; <... $I <= $SIZE ...>; <... $I++ ...>) ...
  - pattern: while (<... $I <= $SIZE ...>) ...
  - pattern: do ... while (<... $I <= $SIZE ...>);
  - pattern: strlen($SRC) > sizeof($DST)
  - pattern: strlen($SRC) <= sizeof($DST)
  - pattern: sizeof($DST) < strlen($SRC)
  - pattern: sizeof($DST) >= strlen($SRC)
  - patterns:
    - pattern: strncat($DST, $SRC, $LEN)
    - metavariable-pattern:
        metavariable: $LEN
        patterns:
        - pattern-not: $VAL - 1
- id: raptor-pointer-subtraction
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/469
    - https://github.com/struct/mms
    confidence: MEDIUM
  message: The software subtracts one pointer from another in order to determine size,
    but this calculation can be incorrect if the pointers do not exist in the same
    memory chunk.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: (char * $PTR1) - (char * $PTR2)
  - pattern: (int * $PTR1) - (int * $PTR2)
  - pattern: (float * $PTR1) - (float * $PTR2)
  - pattern: (double * $PTR1) - (double * $PTR2)
  - patterns:
    - pattern-either:
      - pattern: $PTR1 - $PTR2
      - pattern: $PTR2 - $PTR1
    - pattern-either:
      - pattern-inside: '$TYPE * $PTR1;

          $TYPE * $PTR2;

          ...

          '
      - pattern-inside: '$TYPE * $PTR1 = $EXPR1;

          $TYPE * $PTR2 = $EXPR2;

          ...

          '
      - pattern-inside: '$TYPE * $PTR1 = $EXPR1;

          $TYPE * $PTR2;

          ...

          '
      - pattern-inside: '$TYPE * $PTR1;

          $TYPE * $PTR2 = $EXPR2;

          ...

          '
      - pattern-inside: '$TYPE * $PTR3 = $PTR1;

          $TYPE * $PTR2;

          ...

          '
      - pattern-inside: '$TYPE * $PTR2;

          $TYPE * $PTR3 = $PTR1;

          ...

          '
- id: raptor-unchecked-ret-scanf-etc
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/252
    - https://codeql.github.com/codeql-query-help/cpp/cpp-missing-check-scanf/
    confidence: MEDIUM
  message: The software does not check the return value from a method or function,
    which can prevent it from detecting unexpected states and conditions.
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: $FUN(...)
  - metavariable-pattern:
      metavariable: $FUN
      pattern-either:
      - pattern: scanf
      - pattern: vscanf
      - pattern: fscanf
      - pattern: vfscanf
      - pattern: sscanf
      - pattern: vsscanf
      - pattern: wscanf
      - pattern: vwscanf
      - pattern: fwscanf
      - pattern: vfwscanf
      - pattern: swscanf
      - pattern: vswscanf
  - pattern-not-inside: $RET = $FUN(...)
  - pattern-not-inside: <... $FUN(...) == $VAL ...>
  - pattern-not-inside: <... $VAL == $FUN(...) ...>
  - pattern-not-inside: <... $FUN(...) != $VAL ...>
  - pattern-not-inside: <... $VAL != $FUN(...) ...>
  - pattern-not-inside: <... $FUN(...) < $VAL ...>
  - pattern-not-inside: <... $VAL > $FUN(...) ...>
  - pattern-not-inside: <... $FUN(...) <= $VAL ...>
  - pattern-not-inside: <... $VAL >= $FUN(...) ...>
  - pattern-not-inside: <... $FUN(...) > $VAL ...>
  - pattern-not-inside: <... $VAL < $FUN(...) ...>
  - pattern-not-inside: <... $FUN(...) >= $VAL ...>
  - pattern-not-inside: <... $VAL <= $FUN(...) ...>
  - pattern-not-inside: return $FUN(...);
- id: raptor-unsafe-ret-snprintf-vsnprintf
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://lwn.net/Articles/507319/
    - https://g.co/kgs/PCHQjJ
    - https://dustri.org/b/playing-with-weggli.html
    confidence: MEDIUM
  message: The snprintf() and vsnprintf() functions return the total length of the
    string they tried to create. Therefore, this return value can be larger than the
    size of the destination buffer. If it is used unsafely, e.g. as an index to write
    to the destination buffer, memory corruption might occur. Vulnerabilities such
    as this are not common because the return value is usually discarded. However,
    ignoring the result of these functions can result in data truncation.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: $RET = snprintf(...)
  - pattern: $RET = vsnprintf(...)
  - pattern: $RET += snprintf(...)
  - pattern: $RET += vsnprintf(...)
- id: Unsafe-switch-code WARNING check 1
  metadata:
    author: FXC
  severity: WARNING
  languages:
  - c
  - cpp
  message: 'WARNING: The codes of switch miss break or return or exit.'
  patterns:
  - pattern-either:
    - pattern: 'switch($CASE)

        {

        case $VALUE1:

        ...

        case $VALUE2:

        ...

        }

        '
  - pattern-not: 'switch($CASE)

      {

      case $VALUE1:

      ...

      break;

      ...

      case $VALUE2:

      ...

      }

      '
  - pattern-not: 'switch($CASE)

      {

      case $VALUE1:

      break;

      case $VALUE2:

      ...

      }

      '
  - pattern-not: 'switch($CASE)

      {

      case $VALUE1:

      ...

      return;

      ...

      case $VALUE2:

      ...

      }

      '
  - pattern-not: 'switch($CASE)

      {

      case $VALUE1:

      return;

      case $VALUE2:

      ...

      }

      '
  - pattern-not: 'switch($CASE)

      {

      case $VALUE1:

      ...

      return $V;

      ...

      case $VALUE2:

      ...

      }

      '
  - pattern-not: 'switch($CASE)

      {

      case $VALUE1:

      return $V;

      case $VALUE2:

      ...

      }

      '
  - pattern-not: 'switch($CASE)

      {

      case $VALUE1:

      ...

      exit($V);

      ...

      case $VALUE2:

      ...

      }

      '
  - pattern-not: 'switch($CASE)

      {

      case $VALUE1:

      exit($V);

      case $VALUE2:

      ...

      }

      '
- id: Use-after-free WARNING check 3
  metadata:
    author: FXC
  severity: WARNING
  languages:
  - c
  - cpp
  message: 'WARNING: The global variable was not cleared after being released, and
    there may be a double free.'
  patterns:
  - pattern-not-inside: '$TYPE * $PTR;

      ...

      free($PTR);

      '
  - pattern: free($PTR);
- id: raptor-incorrect-use-of-free
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/590
    - https://github.com/shellphish/how2heap/blob/master/glibc_2.23/house_of_spirit.c
    confidence: MEDIUM
  message: The software calls free() on a pointer to memory that has a short  lifetime
    and was not allocated using associated heap allocation  functions such as malloc(),
    calloc(), or realloc().
  severity: ERROR
  languages:
  - c
  - cpp
  pattern-either:
  - patterns:
    - pattern: free($PTR)
    - pattern-either:
      - pattern-inside: '$TYPE $PTR[$LEN];

          ...

          '
      - pattern-inside: '$TYPE $PTR[$LEN] = $EXPR;

          ...

          '
      - pattern-inside: '$TYPE $ARR[$LEN];

          ...

          $PTR = $ARR;

          ...

          '
      - pattern-inside: '$TYPE $ARR[$LEN] = $EXPR;

          ...

          $PTR = $ARR;

          ...

          '
  - patterns:
    - pattern: free(&$VAR)
    - pattern-either:
      - pattern-inside: '$TYPE $VAR;

          ...

          '
      - pattern-inside: "$TYPE $VAR = $EXPR;\n...          \n"
      - pattern-inside: '$TYPE $VAR[$LEN];

          ...

          '
      - pattern-inside: '$TYPE $VAR[$LEN] = $EXPR;

          ...

          '
      - pattern-inside: '$TYPE * $VAR;

          ...

          '
      - pattern-inside: '$TYPE * $VAR = $EXPR;

          ...

          '
- id: raptor-incorrect-use-of-strncat
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/787
    - https://cwe.mitre.org/data/definitions/193
    - https://g.co/kgs/PCHQjJ
    confidence: HIGH
  message: 'The strncat() function is nearly as dangerous as strcat(), in that it''s
    quite easy to misuse. The first common mistake is supplying the size of  the entire
    buffer instead of the size remaining in the buffer. A more  subtle mistake can
    be made: the size parameter needs to be the amount of space left in the buffer
    less one; otherwise, the NUL byte is written  one byte past the end of the buffer.'
  severity: ERROR
  languages:
  - c
  - cpp
  pattern-either:
  - patterns:
    - pattern: strncat($DST, $SRC, $LEN)
    - pattern-either:
      - pattern-inside: '$TYPE $DST[$LEN];

          ...

          '
      - pattern-inside: '$TYPE $DST[$LEN] = $EXPR;

          ...

          '
  - pattern: strncat($DST, $SRC, sizeof($DST))
  - pattern: strncat($DST, $SRC, strlen($DST))
  - pattern: strncat($DST, $SRC, sizeof($DST) - strlen($DST))
