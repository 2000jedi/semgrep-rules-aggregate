- id: flawfinder.memcpy-1.CopyMemory-1.bcopy-1
  languages:
  - c
  - cpp
  message: 'The `memcpy` family of functions require the developer to validate that
    the destination buffer

    is the same size or larger than the source buffer. Buffer overflows could be introduced
    if care

    is not taken to validate buffer sizes.


    If developing for C Runtime Library (CRT), more secure versions of these functions
    should be

    used, see:

    https://learn.microsoft.com/en-us/cpp/c-runtime-library/reference/memcpy-s-wmemcpy-s?view=msvc-170

    '
  metadata:
    shortDescription: Function does not check for buffer overflows when copying
    cwe: CWE-120
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
    primary_identifier: flawfinder.memcpy-1.CopyMemory-1.bcopy-1
