    - A1:2017-Injection
    - A03:2021-Injection
    security-severity: High
    category: security
    primary_identifier: flawfinder.sprintf-1.vsprintf-1.swprintf-1.vswprintf-1._stprintf-1._vstprintf-1
    secondary_identifiers:
