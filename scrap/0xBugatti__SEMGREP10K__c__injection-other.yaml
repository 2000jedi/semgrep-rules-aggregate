- id: flawfinder.sprintf-1.vsprintf-1.swprintf-1.vswprintf-1._stprintf-1._vstprintf-1
  languages:
  - c
  - cpp
  message: 'Use sprintf_s, snprintf, or vsnprintf instead. The `sprintf` family of
    functions do not allow

    callers to set limits on how many bytes the destination buffer can hold. Consider
    using more

    secure alternatives such as `snprintf`.


    For more information please see: https://linux.die.net/man/3/snprintf


    If developing for C Runtime Library (CRT), more secure versions of these functions
    should be

    used, see:

    https://learn.microsoft.com/en-us/cpp/c-runtime-library/reference/sprintf-s-sprintf-s-l-swprintf-s-swprintf-s-l?view=msvc-170

    '
  metadata:
    shortDescription: Insecure function unable to limit / check buffer sizes
    cwe: CWE-120
