rules:
- id: raptor-incorrect-use-of-strncpy-stpncpy-strlcpy
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/806
    - https://github.com/0xdea/advisories/blob/master/2020-07-solaris-whodo-w.txt
    - https://dustri.org/b/playing-with-weggli.html
    confidence: MEDIUM
  message: The software uses the size of a source buffer when reading from or writing
    to a destination buffer, which may cause it to access memory that is outside of
    the bounds of the buffer.
  severity: ERROR
  languages:
  - c
  - cpp
  pattern-either:
  - patterns:
    - pattern: $FUN($DST, $SRC, $LEN)
    - metavariable-pattern:
        metavariable: $FUN
        pattern-either:
        - pattern: strncpy
        - pattern: stpncpy
        - pattern: strlcpy
        - pattern: strscpy
    - pattern-either:
      - pattern-inside: '$TYPE $SRC[$LEN];

          ...

          '
      - pattern-inside: '$TYPE $SRC[$LEN] = $EXPR;

          ...

          '
  - patterns:
    - pattern: $FUN($DST, $SRC, <... $SRC ...>)
    - metavariable-pattern:
        metavariable: $FUN
        pattern-either:
        - pattern: strncpy
        - pattern: stpncpy
        - pattern: strlcpy
        - pattern: strscpy
- id: raptor-mismatched-memory-management
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/762
    - https://cwe.mitre.org/data/definitions/590
    - https://github.com/struct/mms
    confidence: LOW
  message: The software attempts to return a memory resource to the system, but it
    calls a release function that is not compatible with the function that was originally
    used to allocate that resource. When the memory management functions are mismatched,
    the consequences may be as severe as code execution, memory corruption, or program
    crash. Consequences and ease of exploit will vary depending on the implementation
    of the routines and the object being managed. Due to inherent limitations of Semgrep,
    this rule might generate many false positives and should therefore be customized
    for your codebase.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - patterns:
    - pattern: free($PTR);
    - pattern-not-inside: '$PTR = malloc(...);

        ...

        free($PTR);

        '
    - pattern-not-inside: '$PTR = ($CAST)malloc(...);

        ...

        free($PTR);

        '
    - pattern-not-inside: '$PTR = calloc(...);

        ...

        free($PTR);

        '
    - pattern-not-inside: '$PTR = ($CAST)calloc(...);

        ...

        free($PTR);

        '
    - pattern-not-inside: '$PTR = realloc(...);

        ...

        free($PTR);

        '
    - pattern-not-inside: "$PTR = ($CAST)realloc(...);\n...\nfree($PTR); \n"
- id: raptor-missing-break-in-switch
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/484
    - https://g.co/kgs/PCHQjJ
    - https://github.com/struct/mms
    - https://github.com/returntocorp/semgrep/issues/4939
    confidence: LOW
  message: The software omits a break statement within a switch or similar construct,
    causing code associated with multiple conditions to execute. This can cause problems
    when the programmer only intended to execute code associated with one condition.
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern: 'switch ($VAR) { case $VAL1: ... case $VAL2: ... }

      '
  - pattern-not: 'switch ($VAR) { case $VAL1: ... break; case $VAL2: ... }

      '
  - pattern-not: 'switch ($VAR) { case $VAL1: break; case $VAL2: ... }

      '
  - pattern-not: 'switch ($VAR) { case $VAL1: ... exit($RET); case $VAL2: ... }

      '
  - pattern-not: 'switch ($VAR) { case $VAL1: exit($RET); case $VAL2: ... }

      '
  - pattern-not: 'switch ($VAR) { case $VAL1: ... return; case $VAL2: ... }

      '
  - pattern-not: 'switch ($VAR) { case $VAL1: return; case $VAL2: ... }

      '
  - pattern-not: 'switch ($VAR) { case $VAL1: ... return $RET; case $VAL2: ... }

      '
  - pattern-not: 'switch ($VAR) { case $VAL1: return $RET; case $VAL2: ... }

      '
  - pattern-not: 'switch ($VAR) { case $VAL1: ... goto $LOC; case $VAL2: ... }

      '
  - pattern-not: 'switch ($VAR) { case $VAL1: goto $LOC; case $VAL2: ... }

      '
  - focus-metavariable: $VAR
- id: raptor-unsafe-ret-strlcpy-strlcat
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://lwn.net/Articles/507319/
    - https://g.co/kgs/PCHQjJ
    confidence: MEDIUM
  message: The strlcpy() and strlcat() functions return the total length of the string
    they tried to create. For strlcpy() that means the length of the source string.
    For strlcat() that means the initial length of the destination string plus the
    length of of the source string. Therefore, this return value can be larger than
    the size of the destination buffer. If it is used unsafely, e.g. as an index to
    write to the destination buffer, memory corruption might occur. Vulnerabilities
    such as this are not common because the return value is usually discarded. However,
    ignoring the result of these functions can result in data truncation.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: $RET = strlcpy(...)
  - pattern: $RET = strlcat(...)
  - pattern: $RET = wcslcpy(...)
  - pattern: $RET = wcslcat(...)
  - pattern: $RET += strlcpy(...)
  - pattern: $RET += strlcat(...)
  - pattern: $RET += wcslcpy(...)
  - pattern: $RET += wcslcat(...)
- id: bidirectional-char
  patterns:
  - pattern-either:
    - pattern-regex: "\u202A"
    - pattern-regex: "\u202B"
    - pattern-regex: "\u202D"
    - pattern-regex: "\u202E"
    - pattern-regex: "\u2066"
    - pattern-regex: "\u2067"
    - pattern-regex: "\u2068"
    - pattern-regex: "\u202C"
    - pattern-regex: "\u2069"
  message: This code contains bidirectional (bidi) characters. While this is useful
    for support of right-to-left languages such as Arabic or Hebrew, it can also be
    used to trick language parsers into executing code in a manner that is different
    from how it is displayed in code editing and review tools. If this is not what
    you were expecting, please review this code in an editor that can reveal hidden
    Unicode characters.
  metadata:
    category: security
    technology:
    - unicode
    references:
    - https://trojansource.codes/
    confidence: MEDIUM
    license: Commons Clause License Condition v1.0[LGPL-2.1-only]
  languages:
  - bash
  - c
  - csharp
  - go
  - java
  - javascript
  - json
  - kotlin
  - lua
  - ocaml
  - php
  - python
  - ruby
  - rust
  - scala
  - sh
  - typescript
  - yaml
  severity: WARNING
- id: exec
  message: Process execution detected $EXEC
  severity: INFO
  metadata:
    category: security
    subcategory: audit
    likelihood: LOW
    impact: LOW
    confidence: LOW
    technology:
    - c
  languages:
  - c
  pattern-either:
  - patterns:
    - pattern: '$EXEC(...)

        '
    - metavariable-regex:
        metavariable: $EXEC
        regex: ^(exec|execl|execle|execlp|execv|execve|execvp|exect|fexecve|spawn|spawnp|__spawn2|__spawnp2|posix_spawn|posix_spawnp|system|clone|clone3|sys_clone3)$
  - patterns:
    - pattern: 'syscall($SYSCALL, ...)

        '
    - metavariable-regex:
        metavariable: $SYSCALL
        regex: (sys_|__NR_)(exec|execl|execle|execlp|execv|execve|execvp|exect|fexecve|spawn|spawnp|__spawn2|__spawnp2|posix_spawn|posix_spawnp|system|clone|clone3)
- id: raptor-use-after-free
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/416
    - https://github.com/struct/mms
    - https://www.sei.cmu.edu/downloads/sei-cert-c-coding-standard-2016-v01.pdf
    - https://docs.microsoft.com/en-us/cpp/sanitizers/asan-error-examples
    confidence: MEDIUM
  message: The use of previously-freed memory can have any number of adverse consequences,
    ranging from the corruption of valid data to the execution of arbitrary code,
    depending on the instantiation and timing of the flaw. The simplest way data corruption
    may occur involves the system's reuse of the freed memory.
  severity: ERROR
  languages:
  - c
  - cpp
  patterns:
  - pattern-either:
    - pattern: $PTR->$MEM
    - pattern: $PTR[$POS]
    - pattern: (*$PTR)
    - pattern: return $PTR;
    - patterns:
      - pattern-either:
        - pattern: $FUN(..., <... $PTR ...>, ...)
        - pattern: $FUN(..., <... $PTR->$MEM ...>, ...)
        - pattern: $FUN(..., <... $PTR[$POS] ...>, ...)
        - pattern: $FUN(..., <... (*$PTR) ...>, ...)
        - pattern: $PTR->$FUN(...)
      - metavariable-pattern:
          metavariable: $FUN
          patterns:
          - pattern-not: free
  - pattern-inside: free($PTR); ...
  - pattern-not-inside: "free($PTR);\n...\n$PTR = $EXPR; \n...\n"
