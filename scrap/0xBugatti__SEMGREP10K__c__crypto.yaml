  - pattern: g_random_double_range(...)
  - pattern-regex: (long|short|double|int|float|void)\s(\*|)(\s|)(seed48|lcong48)(\(.*\))\;
  severity: WARNING
- id: raptor-insecure-api-rand-srand
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/338
    - https://cwe.mitre.org/data/definitions/330
    - https://www.sei.cmu.edu/downloads/sei-cert-c-coding-standard-2016-v01.pdf
    confidence: HIGH
  message: The software uses a Pseudo-Random Number Generator (PRNG) in a security
    context, but the PRNG's algorithm is not cryptographically strong. When a non-cryptographic
    PRNG is used in a cryptographic context, it can expose the cryptography to certain
    types of attacks. Often a pseudo-random number generator (PRNG) is not designed
    for cryptography. Sometimes a mediocre source of randomness is sufficient or preferable
    for algorithms that use random numbers. Weak generators generally take less processing
    power and/or do not use the precious, finite, entropy sources on a system. While
    such PRNGs might have very useful features, these same features could be used
    to break the cryptography.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: rand(...)
  - pattern: srand(...)
- id: random-fd-exhaustion
  pattern-either:
  - patterns:
    - pattern: '$FD = open("/dev/urandom", ...);

        ...

        read($FD, ...);

        '
    - pattern-not: '$FD = open("/dev/urandom", ...);

        ...

        $BYTES_READ = read($FD, ...);

        '
  - patterns:
    - pattern: '$FD = open("/dev/random", ...);

        ...

        read($FD, ...);

        '
    - pattern-not: '$FD = open("/dev/random", ...);

        ...

        $BYTES_READ = read($FD, ...);

        '
  message: Call to 'read()' without error checking is susceptible to file descriptor
    exhaustion. Consider using the 'getrandom()' function.
  metadata:
    cwe:
    - 'CWE-774: Allocation of File Descriptors or Handles Without Limits or Throttling'
    references:
    - https://lwn.net/Articles/606141/
    category: security
    technology:
    - c
    confidence: MEDIUM
    subcategory:
    - audit
    likelihood: LOW
    impact: HIGH
  languages:
  - c
  severity: WARNING
- id: raptor-incorrect-use-of-memset
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    category: security
    subcategory:
    - vuln
    vulnerability_class: Mishandled Sensitive Information
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: HIGH
    technology:
    - c
    - cpp
    cwe:
    - 'CWE-683: Function Call With Incorrect Order of Arguments'
    owasp:
    - A04:2025 - Cryptographic Failures
    references:
    - https://lkml.org/lkml/2009/11/11/336
    - https://bugs.mysql.com/bug.php?id=23181
  message: The invocation of memset() is easy to get wrong. The second argument is
    the character and the third argument is the size, but sometimes these arguments
    are in the wrong order. This results in a no-op.
  severity: ERROR
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: memset($_, $_, 0);
  - pattern: memset($_, $_, '\0');
  - pattern: memset($_, sizeof(...), $_);
  - pattern: memset_explicit($_, $_, 0);
  - pattern: memset_explicit($_, $_, '\0');
  - pattern: memset_explicit($_, sizeof(...), $_);
- id: raptor-insecure-api-rand-srand-2
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    category: security
    subcategory:
    - vuln
    vulnerability_class: Cryptographic Issues
    likelihood: MEDIUM
    impact: MEDIUM
    confidence: HIGH
    technology:
    - c
    - cpp
    cwe:
    - 'CWE-338: Use of Cryptographically Weak Pseudo-Random Number Generator (PRNG)'
    - 'CWE-330: Use of Insufficiently Random Values'
    owasp:
    - A04:2025 - Cryptographic Failures
    references:
    - https://www.sei.cmu.edu/downloads/sei-cert-c-coding-standard-2016-v01.pdf
  message: The rand() PRNG should not be used in applications intended to be  portable
    when good randomness is needed. Instead, the use of random()  is recommended.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - pattern: rand(...)
  - pattern: srand(...)
  - pattern: drand48(...)
  - pattern: erand48(...)
  - pattern: lrand48(...)
  - pattern: nrand48(...)
  - pattern: mrand48(...)
  - pattern: jrand48(...)
  - pattern: lcong48(...)
  - pattern: srand48(...)
  - pattern: seed48(...)
- id: raptor-memory-address-exposure
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    category: security
    subcategory:
    - audit
    vulnerability_class: Mishandled Sensitive Information
    likelihood: LOW
    impact: MEDIUM
    confidence: LOW
    technology:
    - c
    - cpp
    cwe:
    - 'CWE-209: Generation of Error Message Containing Sensitive Information'
    - 'CWE-497: Exposure of Sensitive System Information to an Unauthorized Control
      Sphere'
    owasp:
    - A04:2025 - Cryptographic Failures
    references:
    - https://github.com/struct/mms
  message: The software generates an error message that includes sensitive information
    about its environment, users, or associated data. In particular, exposure of memory
    addresses might defeat ASLR.
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern-either:
    - pattern: printf($FMT, ...)
    - pattern: vprintf($FMT, ...)
    - pattern: wprintf($FMT, ...)
    - pattern: vwprintf($FMT, ...)
    - pattern: vcprintf($FMT, ...)
    - pattern: vcwprintf($FMT, ...)
    - pattern: vscprintf($FMT, ...)
    - pattern: vscwprintf($FMT, ...)
    - pattern: printk($FMT, ...)
    - pattern: warn($FMT, ...)
    - pattern: vwarn($FMT, ...)
    - pattern: warnx($FMT, ...)
    - pattern: vwarnx($FMT, ...)
    - pattern: fprintf($_, $FMT, ...)
    - pattern: vfprintf($_, $FMT, ...)
    - pattern: fwprintf($_, $FMT, ...)
    - pattern: vfwprintf($_, $FMT, ...)
    - pattern: sprintf($_, $FMT, ...)
    - pattern: vsprintf($_, $FMT, ...)
    - pattern: asprintf($_, $FMT, ...)
    - pattern: vasprintf($_, $FMT, ...)
    - pattern: dprintf($_, $FMT, ...)
    - pattern: vdprintf($_, $FMT, ...)
    - pattern: wsprintf($_, $FMT, ...)
    - pattern: syslog($_, $FMT, ...)
    - pattern: vsyslog($_, $FMT, ...)
    - pattern: err($_, $FMT, ...)
    - pattern: verr($_, $FMT, ...)
    - pattern: errx($_, $FMT, ...)
    - pattern: verrx($_, $FMT, ...)
    - pattern: warnc($_, $FMT, ...)
    - pattern: vwarnc($_, $FMT, ...)
    - pattern: snprintf($_, $_, $FMT, ...)
    - pattern: vsnprintf($_, $_, $FMT, ...)
    - pattern: swprintf($_, $_, $FMT, ...)
    - pattern: vswprintf($_, $_, $FMT, ...)
    - pattern: errc($_, $_, $FMT, ...)
    - pattern: verrc($_, $_, $FMT, ...)
  - metavariable-regex:
      metavariable: $FMT
      regex: (".*%\w*x.*"|".*%\w*X.*"|".*%\w*p.*")
- id: raptor-mismatched-memory-management-2
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    category: security
    subcategory:
    - vuln
    vulnerability_class: Memory Issues
    likelihood: LOW
    impact: MEDIUM
    confidence: LOW
    technology:
    - c
    - cpp
    cwe:
    - 'CWE-762: Mismatched Memory Management Routines'
    owasp:
    - A06:2025 - Insecure Design
    references:
    - https://github.com/struct/mms
  message: The software attempts to return a memory resource to the system, but it
    calls a release function that is not compatible with the function that was originally
    used to allocate that resource. Due to inherent limitations of Semgrep, this rule
    might generate many false positives and should therefore be customized for your
    codebase.
  severity: INFO
  languages:
  - c
  - cpp
  pattern-either:
  - patterns:
    - pattern: free($PTR);
    - pattern-not-inside: '$PTR = malloc(...);

        ...

        '
    - pattern-not-inside: '$PTR = ($_)malloc(...);

        ...

        '
    - pattern-not-inside: '$PTR = calloc(...);

        ...

        '
    - pattern-not-inside: '$PTR = ($_)calloc(...);

        ...

        '
    - pattern-not-inside: '$PTR = realloc(...);

        ...

        '
    - pattern-not-inside: '$PTR = ($_)realloc(...);

        ...

        '
    - pattern-not-inside: '$PTR = strdup(...);

        ...

        '
    - pattern-not-inside: '$PTR = strndup(...);

        ...

        '
- id: v4.insecure-strcpy-usage
  languages:
  - c
  - cpp
  message: Avoid using strcpy; it can cause buffer overflows. Consider using strncpy
    or safer alternatives.
  severity: WARNING
  pattern: strcpy($DEST, $SRC)
  metadata:
    category: security
    subcategory:
    - vuln
    likelihood: MEDIUM
    impact: HIGH
    confidence: HIGH
    technology:
    - c
    - cpp
- id: encrypt-decrypt-function-name
  patterns:
  - pattern: '$FUNC(...);

      '
  - metavariable-regex:
      metavariable: $FUNC
      regex: .*(encrypt|decrypt).*
  message: '$FUNC name contains encrypt/decrypt. These functions are usually intersting.

    '
  languages:
  - cpp
  - c
  severity: WARNING
  metadata:
    category: hotspot
    references:
    - https://parsiya.net/blog/2022-04-07-code-review-hotspots-with-semgrep/#function-with-encode-and-decode-in-their-names
