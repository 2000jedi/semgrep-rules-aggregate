rules:
- id: flawfinder.EVP_des_ecb-1.EVP_des_cbc-1.EVP_des_cfb-1.EVP_des_ofb-1.EVP_desx_cbc-1
  languages:
  - c
  - cpp
  message: "The DES algorithm has not been recommended for over 15 years and was withdrawn\
    \ from NIST (FIPS\n46-3) in 2005.\n\nConsider using libsodium's `crypto_secretbox_easy`\
    \ authenticated encryption functions instead.\n\nFor more information please see:\n\
    \ https://libsodium.gitbook.io/doc/secret-key_cryptography/secretbox.\n\nIf you\
    \ must be FIPS compliant, consider using OpenSSLs AES or 3DES ciphers.\n"
  metadata:
    shortDescription: Insecure encryption algorithm (DES)
    cwe: CWE-327
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    security-severity: Medium
    category: security
    primary_identifier: flawfinder.EVP_des_ecb-1.EVP_des_cbc-1.EVP_des_cfb-1.EVP_des_ofb-1.EVP_desx_cbc-1
    secondary_identifiers:
    - name: Flawfinder - EVP_des_ecb
      type: flawfinder_func_name
      value: EVP_des_ecb
    - name: Flawfinder - EVP_des_cbc
      type: flawfinder_func_name
      value: EVP_des_cbc
    - name: Flawfinder - EVP_des_cfb
      type: flawfinder_func_name
      value: EVP_des_cfb
    - name: Flawfinder - EVP_des_ofb
      type: flawfinder_func_name
      value: EVP_des_ofb
    - name: Flawfinder - EVP_desx_cbc
      type: flawfinder_func_name
      value: EVP_desx_cbc
  pattern-either:
  - pattern: EVP_des_ecb(...)
  - pattern: EVP_des_cbc(...)
  - pattern: EVP_des_cfb(...)
  - pattern: EVP_des_ofb(...)
  - pattern: EVP_desx_cbc(...)
  severity: ERROR
- id: flawfinder.EVP_rc4_40-1.EVP_rc2_40_cbc-1.EVP_rc2_64_cbc-1
  languages:
  - c
  - cpp
  message: 'The RC4 algorithm is vulnerable to many attacks and should no longer be
    used for encrypting

    data streams.


    Consider using libsodium''s `crypto_secretstream_xchacha20poly1305` stream cipher
    encryption

    functions instead. For more information please see:

    https://libsodium.gitbook.io/doc/secret-key_cryptography/secretstream


    If you must be FIPS compliant, consider using OpenSSLs AES or 3DES ciphers.

    '
  metadata:
    shortDescription: Insecure stream cipher (RC4)
    cwe: CWE-327
    owasp:
    - A3:2017-Sensitive Data Exposure
    - A02:2021-Cryptographic Failures
    security-severity: Medium
    category: security
    primary_identifier: flawfinder.EVP_rc4_40-1.EVP_rc2_40_cbc-1.EVP_rc2_64_cbc-1
    secondary_identifiers:
    - name: Flawfinder - EVP_rc4_40
