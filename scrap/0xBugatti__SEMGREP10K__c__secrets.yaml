rules:
- id: raptor-high-entropy-assignment
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    category: security
    subcategory:
    - audit
    vulnerability_class: Hard-coded Secrets
    likelihood: LOW
    impact: MEDIUM
    confidence: MEDIUM
    technology:
    - c
    - cpp
    cwe:
    - 'CWE-540: Inclusion of Sensitive Information in Source Code'
    owasp:
    - A06:2025 - Insecure Design
    references:
    - https://semgrep.dev/docs/writing-rules/metavariable-analysis
    - https://github.com/semgrep/semgrep/pull/4672
  message: Entropy, or randomness, is a common approach for detecting secret strings.
    If an assignment has high entropy, it might involve a secret that should not be
    accessible to users.
  severity: INFO
  languages:
  - c
  - cpp
  patterns:
  - pattern: $_ = "$X"
  - metavariable-analysis:
      analyzer: entropy
      metavariable: $X
- id: maswe-0001-c1-sensitive-data-logged
  languages:
  - swift
  - c
  - cpp
  severity: HIGH
  message: Sensitive data appears to be logged via '$FUNC(...)'. Variable or interpolated
    value names matching sensitive data identifiers (e.g., password, token, secret,
    creditCard) were detected in log arguments. Remove this call or redact sensitive
    data before logging.
  metadata:
    masweId: MASWE-0001
    checkId: check-1
    category: security
    masvs:
    - MASVS-STORAGE-1
    mastgRefs:
    - MASTG-TEST-0297
    - MASTG-TEST-0296
    - MASTG-BEST-0022
    confidence: HIGH
  patterns:
  - pattern-either:
    - pattern: NSLog(..., $ARG, ...)
    - pattern: print(..., $ARG, ...)
    - pattern: debugPrint(..., $ARG, ...)
    - pattern: dump($ARG, ...)
    - pattern: println(..., $ARG, ...)
    - pattern: printf(..., $ARG, ...)
    - pattern: NSAssert(..., $ARG, ...)
    - pattern: NSCAssert(..., $ARG, ...)
  - metavariable-regex:
      metavariable: $ARG
      regex: (?i).*(password|passwd|pwd|passcode|token|secret|secretKey|secret_key|privateKey|private_key|apiKey|api_key|apiSecret|api_secret|clientSecret|client_secret|signingKey|encryptionKey|masterKey|decryptionKey|creditCard|credit_card|cardNumber|card_number|cvv|cvc|ssn|socialSecurity|social_security|accessToken|refreshToken|authToken|bearerToken|idToken|sessionToken|credential|credentials|jwt|otp|biometric|fingerprint)
