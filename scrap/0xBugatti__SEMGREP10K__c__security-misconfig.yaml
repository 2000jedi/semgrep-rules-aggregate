  - pattern-not-inside: '$FUN($DST, $SRC, $N);

      ...

      $DST[$POS] = 0;

      '
- id: Use-after-free WARNING check 1
  metadata:
    author: FXC
  severity: WARNING
  languages:
  - c
  - cpp
  message: 'WARNING: Returning pointer related values after releasing the pointer
    may cause information disclosure.'
  patterns:
  - pattern: 'free($PTR);

      ...

      return $PTR[$OFFSET];

      '
  - pattern-not: 'free($PTR);

      ...

      $PTR = $PTR1;

      ...

      return $PTR[$OFFSET];

      '
- id: Use-after-free WARNING check 2
  metadata:
    author: FXC
  severity: WARNING
  languages:
  - c
  - cpp
  message: 'WARNING: After releasing the pointer, call the output function to output
    data related to the pointer, which may cause information disclosure.'
  patterns:
  - pattern: 'free($PTR);

      ...

      $FUN(..., $PTR, ...);

      '
  - pattern-not: 'free($PTR);

      ...

      $PTR = $PTR1;

      ...

      $FUN(..., $PTR, ...);

      '
  - metavariable-pattern:
      metavariable: $FUN
      pattern-either:
      - pattern: puts
      - pattern: fputs
      - pattern: printf
      - pattern: fprintf
      - pattern: send
      - pattern: sendto
- id: raptor-incorrect-order-setuid-setgid
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    category: security
    subcategory:
    - vuln
    vulnerability_class: Improper Authorization
    likelihood: MEDIUM
    impact: HIGH
    confidence: MEDIUM
    technology:
    - c
    - cpp
    cwe:
    - 'CWE-696: Incorrect Behavior Order'
    owasp:
    - A01:2025 - Broken Access Control
    references:
    - https://www.usenix.org/legacy/events/sec02/full_papers/chen/chen.pdf
    - https://g.co/kgs/PCHQjJ
    - https://github.com/struct/mms
  message: A compromised process might be able to regain elevated group privileges
    if set(e)gid() is called after set(e)uid(). A similar case is when  privileges
    are temporarily dropped with seteuid() and then setuid() or  seteuid() are called
    from while under unprivileged user.
  severity: ERROR
  languages:
  - c
  - cpp
  pattern-either:
  - patterns:
    - pattern: 'setuid(...);

        ...

        setgid(...);

        '
    - pattern-not: 'setuid(0);

        ...

        setgid(...);

        '
  - patterns:
    - pattern: 'seteuid(...);

        ...

        setegid(...);

        '
    - pattern-not: 'seteuid(0);

        ...

        setegid(...);

        '
    - pattern-not-inside: 'seteuid(...);

        ...

        seteuid(0);

        ...

        setegid(...);

        '
  - patterns:
    - pattern: 'seteuid(...);

        ...

        setuid(...);

        '
    - pattern-not: 'seteuid(0);

        ...

        setuid(...);

        '
    - pattern-not-inside: 'seteuid(...);

        ...

        seteuid(0);

        ...

        setuid(...);

        '
  - patterns:
    - pattern: 'seteuid(...);

        ...

        seteuid(...);

        '
    - pattern-not: 'seteuid(0);

        ...

        seteuid(...);

        '
    - pattern-not: 'seteuid(...);

        ...

        seteuid(0);

        '
    - pattern-not-inside: 'seteuid(...);

        ...

        seteuid(0);

        ...

        seteuid(...);

        '
- id: raptor-suspicious-assert
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://legends2k.github.io/note/assert_vs_if/
    - https://github.com/struct/mms
    confidence: MEDIUM
  message: Most codebases define assertion macros which compile to a no-op on non-debug
    builds. If assertions are the only line of defense against untrusted input, the
    software may be exposed to attacks that leverage the lack of proper input checks.
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern-either:
    - pattern: $ASSERT(..., <... $A < $B ...>, ...)
    - pattern: $ASSERT(..., <... $A <= $B ...>, ...)
    - pattern: $ASSERT(..., <... $A > $B ...>, ...)
    - pattern: $ASSERT(..., <... $A >= $B ...>, ...)
  - metavariable-regex:
      metavariable: $ASSERT
      regex: (?i)^\w*assert\w*\s*$
