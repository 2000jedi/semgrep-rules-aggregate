rules:
- id: flawfinder.umask-1
  languages:
  - c
  - cpp
  message: 'The umask function call sets the process''s file mode creation mask. umask
    values determine

    what permissions a file should be created with and who can read or write to these
    files.

    Ensure that umask is given most restrictive possible setting depending on the
    context,

    usually 066 or 077, for more information please see:

    https://en.wikipedia.org/wiki/Umask#Mask_effect.

    '
  metadata:
    shortDescription: Ensure restrictive umask values
    cwe: CWE-732
    owasp:
    - A6:2017-Security Misconfiguration
    - A05:2021-Security Misconfiguration
    security-severity: High
    category: security
    primary_identifier: flawfinder.umask-1
    secondary_identifiers:
    - name: Flawfinder - umask
      type: flawfinder_func_name
      value: umask
  pattern: umask(...)
  severity: INFO
- id: flawfinder.chmod-1
  languages:
  - c
  - cpp
  message: 'Usage of the `chmod` function call hints at a potential Time Of Check
    Time Of Use (TOCTOU)

    vulnerability. An attacker may be able to modify the file being specified by the
    `chmod`

    function prior to the `chmod` function being called. Since `chmod` will resolve
    symbolic links,

    an attacker may be able to exploit this fact to have files outside of their control
    modified.


    It is recommended that the `fchmod` function be used instead since this function
    takes

    a file descriptor instead of a file. Ensure the opened file descriptor is pointing
    to

    the correct file or directory prior to executing `fchmod` or any other file based
    operations.


    For more information please see:

    https://wiki.sei.cmu.edu/confluence/display/c/FIO01-C.+Be+careful+using+functions+that+use+file+names+for+identification

    '
  metadata:
    shortDescription: Potential time of check time of use vulnerability (chmod)
    cwe: CWE-362
    owasp:
    - A5:2017-Broken Access Control
    - A01:2021-Broken Access Control
    security-severity: Medium
    category: security
    primary_identifier: flawfinder.chmod-1
    secondary_identifiers:
    - name: Flawfinder - chmod
      type: flawfinder_func_name
      value: chmod
  pattern: chmod(...)
  severity: ERROR
- id: info-leak-on-non-formated-string
  message: Use %s, %d, %c... to format your variables, otherwise this could leak information.
  metadata:
    cwe:
    - 'CWE-532: Insertion of Sensitive Information into Log File'
    references:
    - http://nebelwelt.net/files/13PPREW.pdf
    category: security
    technology:
    - c
    confidence: LOW
    owasp:
    - A09:2021 - Security Logging and Monitoring Failures
    - A09:2025 - Security Logging & Alerting Failures
    subcategory:
    - audit
    likelihood: LOW
    impact: MEDIUM
  languages:
  - c
  severity: WARNING
  pattern: printf(argv[$NUM]);
- id: raptor-unchecked-ret-setuid-seteuid
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/252
    - https://lwn.net/Articles/451985/
    - https://www.usenix.org/legacy/events/sec02/full_papers/chen/chen.pdf
    confidence: MEDIUM
  message: The software does not check the return value from a method or function,
    which can prevent it from detecting unexpected states and conditions. If an attacker
    can force the function to fail or otherwise return a value that is not expected,
    then the subsequent program logic could lead to a vulnerability, because the software
    is not in a state that the programmer assumes. For example, if the program calls
    a function to drop privileges but does not check the return code to ensure that
    privileges were successfully dropped, then the program will continue to operate
    with the higher privileges.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - patterns:
    - pattern: setuid(...)
    - pattern-not-inside: $RET = setuid(...)
    - pattern-not-inside: <... setuid(...) == $VAL ...>
    - pattern-not-inside: <... setuid(...) != $VAL ...>
    - pattern-not-inside: <... setuid(...) < $VAL ...>
    - pattern-not-inside: <... !setuid(...) ...>
    - pattern-not-inside: return setuid(...);
  - patterns:
    - pattern: seteuid(...)
    - pattern-not-inside: $RET = seteuid(...)
    - pattern-not-inside: <... seteuid(...) == $VAL ...>
    - pattern-not-inside: <... seteuid(...) != $VAL ...>
    - pattern-not-inside: <... seteuid(...) < $VAL ...>
    - pattern-not-inside: <... !seteuid(...) ...>
    - pattern-not-inside: return seteuid(...);
- id: raptor-unchecked-ret-setuid-seteuid-2
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/252
    - https://lwn.net/Articles/451985/
    - https://www.usenix.org/legacy/events/sec02/full_papers/chen/chen.pdf
    - https://www.openwall.com/lists/oss-security/2023/12/30/4
    confidence: MEDIUM
  message: The software does not check the return value from a method or function,
    which can prevent it from detecting unexpected states and conditions. If the program
    calls a function to drop privileges but  does not check the return code to ensure
    that privileges were  successfully dropped, then the program will continue to
    operate with  the higher privileges.
  severity: WARNING
  languages:
  - c
  - cpp
  patterns:
  - pattern: $FUN(...)
  - metavariable-pattern:
      metavariable: $FUN
      pattern-either:
      - pattern: setuid
      - pattern: seteuid
  - pattern-not-inside: $RET = $FUN(...)
  - pattern-not-inside: <... $FUN(...) == $VAL ...>
  - pattern-not-inside: <... $VAL == $FUN(...) ...>
  - pattern-not-inside: <... $FUN(...) != $VAL ...>
  - pattern-not-inside: <... $VAL != $FUN(...) ...>
  - pattern-not-inside: <... $FUN(...) < $VAL ...>
  - pattern-not-inside: <... $VAL > $FUN(...) ...>
  - pattern-not-inside: <... !$FUN(...) ...>
  - pattern-not-inside: return $FUN(...);
- id: raptor-unterminated-string-strncpy-stpncpy
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/170
    - https://cwe.mitre.org/data/definitions/126
    - https://g.co/kgs/PCHQjJ
    - https://www.sei.cmu.edu/downloads/sei-cert-c-coding-standard-2016-v01.pdf
    confidence: MEDIUM
  message: The software does not terminate or incorrectly terminates a string or array
    with a NUL character or equivalent terminator. If there is no NUL character byte
    in the first n bytes of the source string, strncpy() and stpncpy() do not null-terminate
    the destination buffer. If the program does not explicitly terminate the destination
    buffer, this will almost certainly result in information disclosure, and possibly
    a buffer overflow condition, which may be exploited to execute arbitrary code.
  severity: WARNING
  languages:
  - c
  - cpp
  pattern-either:
  - patterns:
    - pattern: strncpy(...)
    - pattern-not-inside: 'strncpy($DST, $SRC, $N);

        ...

        $DST[$POS] = NULL;

        '
    - pattern-not-inside: 'strncpy($DST, $SRC, $N);

        ...

        $DST[$POS] = ''\0'';

        '
    - pattern-not-inside: 'strncpy($DST, $SRC, $N);

        ...

        $DST[$POS] = 0;

        '
  - patterns:
    - pattern: stpncpy(...)
    - pattern-not-inside: 'stpncpy($DST, $SRC, $N);

        ...

        $DST[$POS] = NULL;

        '
    - pattern-not-inside: 'stpncpy($DST, $SRC, $N);

        ...

        $DST[$POS] = ''\0'';

        '
    - pattern-not-inside: 'stpncpy($DST, $SRC, $N);

        ...

        $DST[$POS] = 0;

        '
  - patterns:
    - pattern: wcsncpy(...)
    - pattern-not-inside: 'wcsncpy($DST, $SRC, $N);

        ...

        $DST[$POS] = NULL;

        '
    - pattern-not-inside: 'wcsncpy($DST, $SRC, $N);

        ...

        $DST[$POS] = ''\0'';

        '
    - pattern-not-inside: 'wcsncpy($DST, $SRC, $N);

        ...

        $DST[$POS] = 0;

        '
  - patterns:
    - pattern: wcpncpy(...)
    - pattern-not-inside: 'wcpncpy($DST, $SRC, $N);

        ...

        $DST[$POS] = NULL;

        '
    - pattern-not-inside: 'wcpncpy($DST, $SRC, $N);

        ...

        $DST[$POS] = ''\0'';

        '
    - pattern-not-inside: 'wcpncpy($DST, $SRC, $N);

        ...

        $DST[$POS] = 0;

        '
- id: raptor-unterminated-string-strncpy-stpncpy-2
  metadata:
    author: Marco Ivaldi <raptor@0xdeadbeef.info>
    references:
    - https://cwe.mitre.org/data/definitions/170
