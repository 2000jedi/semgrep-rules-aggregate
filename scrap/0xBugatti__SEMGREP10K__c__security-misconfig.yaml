- id: Possible-Race-Condition
  metadata:
    author: Victor 4ernyak <https://t.me/iter_malum>
    confidence: MEDIUM
    category: security
    cwe:
    - 'CWE-366: Race Condition within a Thread'
    - 'CWE-367: Time-of-check Time-of-use (TOCTOU)'
    - 'CWE-362: Concurrent Execution using Shared Resource'
    vulnerability_class:
    - Concurrency
    owasp:
    - A05:2021 - Security Misconfiguration
    references:
    - https://cwe.mitre.org/data/definitions/366.html
    - https://cwe.mitre.org/data/definitions/367.html
    - https://cwe.mitre.org/data/definitions/362.html
    - https://www.sei.cmu.edu/downloads/sei-cert-c-coding-standard-2016-v01.pdf
    technology:
    - c
    - cpp
  languages:
  - c
  - c++
  severity: WARNING
  message: 'Potential race condition detected. Multiple threads may access shared  resources
    without proper synchronization, leading to undefined behavior,  data corruption,
    or security vulnerabilities. Use mutexes, atomic  operations, or other synchronization
    primitives to protect shared state.

    '
  pattern-either:
  - patterns:
    - pattern-either:
      - pattern: access($PATH, $MODE)
      - pattern: stat($PATH, $BUF)
      - pattern: lstat($PATH, $BUF)
    - pattern-inside: "if ($FUNC($PATH, ...) == 0) {\n  ...\n}\n"
    - pattern-either:
      - pattern: fopen($PATH, $MODE)
      - pattern: open($PATH, $FLAGS)
      - pattern: unlink($PATH)
      - pattern: mkdir($PATH, $MODE)
      - pattern: rename($PATH, $NEW_PATH)
    - pattern-inside: "if ($FUNC($PATH, ...) == 0) {\n  ...\n  $OPERATION($PATH, ...);\n\
        \  ...\n}\n"
    - pattern-not-inside: "if ($FUNC($PATH, ...) == 0) {\n  ...\n  pthread_mutex_lock(...);\n\
        \  ...\n  $OPERATION($PATH, ...);\n  ...\n  pthread_mutex_unlock(...);\n \
        \ ...\n}\n"
    - pattern-not-inside: "if ($FUNC($PATH, ...) == 0) {\n  ...\n  std::lock_guard<...>\
        \ ...;\n  ...\n  $OPERATION($PATH, ...);\n  ...\n}\n"
  - patterns:
    - pattern-either:
      - pattern: $VAR++
      - pattern: $VAR--
      - pattern: ++$VAR
      - pattern: --$VAR
      - pattern: $VAR += $EXPR
      - pattern: $VAR -= $EXPR
      - pattern: $VAR = $VALUE
      - pattern: $VAR == $VALUE
      - pattern: $VAR != $VALUE
      - pattern: $VAR < $VALUE
      - pattern: $VAR > $VALUE
    - metavariable-regex:
        metavariable: $VAR
        regex: ^(global|shared|g_|connection|cpp_shared|logger|pool|cache|obj|singleton_instance|signal_flag).*
    - pattern-not-inside: 'pthread_mutex_lock(...);

        ...

        $VAR++;

        ...

        pthread_mutex_unlock(...);

        '
    - pattern-not-inside: 'std::lock_guard<...> ...;

        ...

        $VAR++;

        ...

        '
    - pattern-not-inside: 'std::atomic<...> ...;

        ...

        $VAR++;

        ...

        '
  - patterns:
    - pattern-either:
      - pattern: pthread_create($THREAD, $ATTR, $FUNC, $ARG)
      - pattern: _beginthread($FUNC, ...)
